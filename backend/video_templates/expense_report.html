<!doctype html>
<html lang="$language_code" dir="$direction">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #17130f;
        color: #f7eedc;
        font-family: "Work Sans", sans-serif;
      }
      #expense-report {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #17130f;
        direction: $direction;
      }
      .localized {
        font-family: "$font_family", sans-serif;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .scene-content {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        padding: 112px 132px;
        gap: 34px;
      }
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 18px;
        color: #f4b942;
        font-size: 23px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .eyebrow::before {
        width: 74px;
        height: 3px;
        content: "";
        background: #f4b942;
      }
      .display {
        margin: 0;
        font-family: "Fraunces", serif;
        font-weight: 900;
        letter-spacing: -0.045em;
        line-height: 0.92;
      }
      .metadata {
        display: flex;
        gap: 18px;
        margin-top: auto;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 58px;
        padding: 0 24px;
        border: 2px solid rgba(247, 238, 220, 0.28);
        border-radius: 999px;
        color: #f7eedc;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: 0.04em;
      }
      .ledger-rule {
        width: 100%;
        height: 2px;
        background: rgba(247, 238, 220, 0.26);
        transform-origin: left center;
      }
      #scene1 {
        z-index: 1;
        background-color: #17130f;
      }
      #scene1::before {
        position: absolute;
        inset: -220px -120px auto auto;
        width: 920px;
        height: 920px;
        border-radius: 50%;
        content: "";
        background: radial-gradient(circle, rgba(217, 119, 6, 0.36), rgba(217, 119, 6, 0));
      }
      #scene1::after {
        position: absolute;
        right: 104px;
        bottom: 74px;
        width: 690px;
        height: 690px;
        border: 2px solid rgba(247, 238, 220, 0.16);
        border-radius: 50%;
        content: "";
      }
      #scene1 .title {
        max-width: 1240px;
        font-size: 154px;
      }
      #scene1 .receipt-number {
        position: absolute;
        right: 142px;
        bottom: 112px;
        color: rgba(247, 238, 220, 0.12);
        font-family: "Fraunces", serif;
        font-size: 310px;
        font-weight: 900;
        letter-spacing: -0.06em;
      }
      #scene2 {
        z-index: 2;
        background-color: #f7eedc;
        color: #17130f;
        opacity: 0;
      }
      #scene2 .scene-content {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        grid-template-rows: auto 1fr auto;
        column-gap: 92px;
      }
      #scene2 .eyebrow {
        grid-column: 1 / -1;
        color: #965307;
      }
      #scene2 .eyebrow::before { background: #965307; }
      .amount-wrap {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        grid-column: 1;
        grid-row: 2;
      }
      .amount {
        position: relative;
        z-index: 2;
        color: #17130f;
        font-size: 226px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .amount-halo {
        position: absolute;
        left: -42px;
        width: 720px;
        height: 720px;
        border: 56px solid rgba(244, 185, 66, 0.54);
        border-radius: 50%;
      }
      .detail-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        grid-column: 2;
        grid-row: 2;
        gap: 34px;
        padding: 46px 0 46px 64px;
        border-left: 3px solid #d97706;
      }
      .detail-label {
        color: #8a5a24;
        font-size: 20px;
        font-weight: 750;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .description {
        max-width: 650px;
        margin: 0;
        color: #17130f;
        font-family: "Fraunces", serif;
        font-size: 58px;
        font-weight: 800;
        letter-spacing: -0.035em;
        line-height: 1.08;
      }
      #scene2 .metadata {
        grid-column: 1 / -1;
        grid-row: 3;
      }
      #scene2 .pill {
        border-color: rgba(23, 19, 15, 0.24);
        color: #17130f;
      }
      #scene3 {
        z-index: 3;
        background-color: #065f46;
        opacity: 0;
      }
      #scene3::before {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(rgba(247, 238, 220, 0.07) 2px, rgba(247, 238, 220, 0) 2px),
          linear-gradient(90deg, rgba(247, 238, 220, 0.07) 2px, rgba(247, 238, 220, 0) 2px);
        background-size: 96px 96px;
      }
      #scene3 .scene-content { justify-content: center; }
      .summary-kicker {
        color: #f4b942;
        font-size: 26px;
        font-weight: 750;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .summary-title {
        max-width: 1480px;
        font-size: 142px;
      }
      .summary-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 44px;
        padding-top: 32px;
        border-top: 2px solid rgba(247, 238, 220, 0.34);
      }
      .summary-footer strong {
        font-family: "Fraunces", serif;
        font-size: 42px;
      }
      .summary-footer span {
        color: rgba(247, 238, 220, 0.78);
        font-size: 24px;
      }
      .light-overlay {
        position: absolute;
        z-index: 80;
        pointer-events: none;
        opacity: 0;
      }
      #leak-warm {
        inset: 0;
        background-color: #d97706;
      }
      #leak-1 {
        top: -620px;
        left: -760px;
        width: 2600px;
        height: 2400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 238, 178, 0.98), rgba(244, 185, 66, 0));
      }
      #leak-2 {
        top: -740px;
        left: -1050px;
        width: 2800px;
        height: 2600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 124, 42, 0.86), rgba(217, 119, 6, 0));
      }
      /* HyperFrames catalog component: grain-overlay */
      #grain-overlay {
        position: absolute;
        z-index: 100;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      @keyframes hf-grain-noise {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -5%); }
        20% { transform: translate(-10%, 5%); }
        30% { transform: translate(5%, -10%); }
        40% { transform: translate(-5%, 15%); }
        50% { transform: translate(-10%, 5%); }
        60% { transform: translate(15%, 0); }
        70% { transform: translate(0, 10%); }
        80% { transform: translate(-15%, 0); }
        90% { transform: translate(10%, 5%); }
      }
      #grain-overlay .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.11;
        animation: hf-grain-noise 0.5s steps(1) infinite;
      }
    </style>
  </head>
  <body>
    <div
      id="expense-report"
      data-composition-id="expense-report"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="12"
    >
      <section id="scene1" class="scene">
        <div class="scene-content">
          <div id="s1-eyebrow" class="eyebrow localized">$brand_line · $date</div>
          <div id="s1-rule" class="ledger-rule"></div>
          <h1 id="s1-title" class="display title localized">$title</h1>
          <div id="s1-meta" class="metadata">
            <span class="pill localized">$category</span>
            <span class="pill localized">$expense_captured</span>
          </div>
        </div>
        <div id="s1-number" class="receipt-number">01</div>
      </section>
      <section id="scene2" class="scene" data-layout-allow-overflow>
        <div class="scene-content">
          <div id="s2-eyebrow" class="eyebrow localized">$spend_heading</div>
          <div class="amount-wrap">
            <div id="amount-halo" class="amount-halo"></div>
            <div id="s2-amount" class="display amount">$amount</div>
          </div>
          <div id="s2-panel" class="detail-panel">
            <div class="detail-label localized">$description_label</div>
            <p id="s2-description" class="description localized">$description</p>
          </div>
          <div id="s2-meta" class="metadata">
            <span class="pill localized">$category</span>
            <span class="pill localized">$date</span>
          </div>
        </div>
      </section>
      <section id="scene3" class="scene" data-layout-allow-overflow>
        <div class="scene-content">
          <div id="s3-kicker" class="summary-kicker localized">$summary_kicker</div>
          <h2 id="s3-title" class="display summary-title localized">$summary_title</h2>
          <div id="s3-footer" class="summary-footer">
            <strong class="localized">$brand_line</strong>
            <span class="localized">$summary_subtitle</span>
          </div>
        </div>
      </section>
      <div id="leak-warm" class="light-overlay"></div>
      <div id="leak-1" class="light-overlay"></div>
      <div id="leak-2" class="light-overlay"></div>
      <div id="grain-overlay"><div class="grain-texture"></div></div>
      <audio id="background-music" data-start="0" data-duration="12" data-track-index="10" data-volume="0.34" src="background.m4a"></audio>
      <audio id="transition-sfx" data-start="3.68" data-duration="1.2" data-track-index="11" data-volume="0.72" src="transition.m4a"></audio>
      <audio id="reveal-sfx" data-start="7.7" data-duration="1.2" data-track-index="12" data-volume="0.58" src="transition.m4a"></audio>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#s1-eyebrow", { x: -54, opacity: 0, duration: 0.52, ease: "expo.out" }, 0.18);
      tl.from("#s1-rule", { scaleX: 0, duration: 0.72, ease: "power4.out" }, 0.28);
      tl.from("#s1-title", { y: 76, opacity: 0, duration: 0.82, ease: "power3.out" }, 0.42);
      tl.from("#s1-meta .pill", { x: 42, opacity: 0, duration: 0.44, stagger: 0.09, ease: "back.out(1.25)" }, 0.86);
      tl.from("#s1-number", { scale: 0.86, rotation: -7, opacity: 0, duration: 1.1, ease: "sine.out" }, 0.58);
      tl.to("#leak-warm", { opacity: 0.42, duration: 0.28, ease: "power1.in" }, 3.68);
      tl.to("#leak-1", { opacity: 0.94, x: 420, duration: 0.5, ease: "sine.inOut" }, 3.72);
      tl.to("#leak-2", { opacity: 0.82, x: 280, duration: 0.58, ease: "power2.inOut" }, 3.76);
      tl.set("#scene1", { opacity: 0 }, 4.12);
      tl.set("#scene2", { opacity: 1 }, 4.12);
      tl.to("#leak-warm", { opacity: 0, duration: 0.42, ease: "power2.out" }, 4.16);
      tl.to("#leak-1", { opacity: 0, x: 720, duration: 0.38, ease: "power1.out" }, 4.18);
      tl.to("#leak-2", { opacity: 0, x: 560, duration: 0.46, ease: "sine.out" }, 4.18);
      tl.from("#s2-eyebrow", { y: -32, opacity: 0, duration: 0.42, ease: "power3.out" }, 4.2);
      tl.from("#amount-halo", { scale: 0.72, opacity: 0, duration: 0.78, ease: "back.out(1.12)" }, 4.28);
      tl.from("#s2-amount", { x: -96, opacity: 0, duration: 0.72, ease: "expo.out" }, 4.4);
      tl.from("#s2-panel", { x: 78, opacity: 0, duration: 0.62, ease: "power4.out" }, 4.62);
      tl.from("#s2-description", { letterSpacing: "0.04em", opacity: 0, duration: 0.56, ease: "sine.out" }, 4.78);
      tl.from("#s2-meta .pill", { y: 28, opacity: 0, duration: 0.38, stagger: 0.08, ease: "circ.out" }, 5.02);
      tl.to("#amount-halo", { scale: 1.045, opacity: 0.78, duration: 0.9, repeat: 1, yoyo: true, ease: "sine.inOut" }, 5.35);
      tl.to("#scene2", { x: -1920, duration: 0.52, ease: "power3.inOut" }, 7.68);
      tl.fromTo("#scene3", { x: 1920, opacity: 1 }, { x: 0, duration: 0.52, ease: "power3.inOut" }, 7.68);
      tl.from("#s3-kicker", { x: -64, opacity: 0, duration: 0.48, ease: "expo.out" }, 8.08);
      tl.from("#s3-title", { y: 86, opacity: 0, duration: 0.86, ease: "power4.out" }, 8.22);
      tl.from("#s3-footer", { scaleX: 0.84, opacity: 0, transformOrigin: "left center", duration: 0.62, ease: "circ.out" }, 8.76);
      tl.from("#s3-footer strong", { x: -36, opacity: 0, duration: 0.4, ease: "back.out(1.18)" }, 8.92);
      tl.from("#s3-footer span", { x: 44, opacity: 0, duration: 0.46, ease: "sine.out" }, 9.02);
      tl.to("#scene3", { opacity: 0, duration: 0.65, ease: "power2.in" }, 11.3);
      window.__timelines["expense-report"] = tl;
    </script>
  </body>
</html>
