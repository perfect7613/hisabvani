services:
  - type: web
    name: hisabvani-api
    runtime: python
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: pip install .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_PATH
        value: /tmp/hisabvani.db
      - key: VIDEO_OUTPUT_DIR
        value: /tmp/generated_videos
      - key: VIDEO_RENDER_WORKERS
        value: "1"
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: ALLOWED_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: SARVAM_API_KEY
        sync: false
      - key: DAYTONA_API_KEY
        sync: false
      - key: DAYTONA_API_URL
        value: https://app.daytona.io/api
      - key: HEYGEN_API_KEY
        sync: false
